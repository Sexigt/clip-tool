name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Configure .pypirc
        run: |
          cat > ~/.pypirc << 'PYPIRC'
          [distutils]
          index-servers = github

          [github]
          repository = https://pypi.pkg.github.com
          username = sexigt
          password = TOKEN
          PYPIRC
          sed -i "s|TOKEN|${{ secrets.PAT_TOKEN }}|g" ~/.pypirc

      - name: Publish to GitHub Packages
        run: twine upload -r github dist/*
